<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<title>Hand Playground | Webcam Hand-Tracking Draw & Fireworks | Arsalan</title>
<meta name="description" content="Hand Playground is a browser-based hand-tracking toy — draw in the air with one finger or trigger fireworks with an open palm, powered by MediaPipe and your webcam." />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="manifest" href="site.webmanifest">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<style>
  :root{
    --bg:#000;
    --line:#1c1c22;
    --text:#f0f0f2;
    --dim:#82828c;
    --cyan:#4de8ff;
    --gold:#ffd166;
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0; background:#050506; color:var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    overflow:hidden;
  }
  header{
    position:absolute; top:0; left:0; right:0; z-index:10;
    padding:18px 22px; display:flex; align-items:center; justify-content:space-between;
    pointer-events:none;
  }
  header *{ pointer-events:auto; }
  h1{ margin:0; font-size:16px; font-weight:600; letter-spacing:0.2px; color:#fff; }
  h1 span{ color:var(--dim); font-weight:400; }
  .modes{
    display:flex; gap:6px; background:rgba(255,255,255,0.05); padding:4px;
    border-radius:10px; backdrop-filter: blur(6px);
  }
  .modeBtn{
    background:transparent; border:none; color:var(--dim); font-size:13px;
    padding:7px 14px; border-radius:8px; cursor:pointer; transition:.15s;
  }
  .modeBtn.active{ background:#1a1a20; color:#fff; }
  .modeBtn:hover{ color:#fff; }

  #stage{ position:fixed; inset:0; background:#000; }
  video{
    position:absolute; top:0; left:0; width:100%; height:100%;
    opacity:0; pointer-events:none;
  }
  canvas{ position:absolute; top:0; left:0; width:100%; height:100%; }
  #errBox{
    position:absolute; bottom:70px; left:0; right:0; text-align:center;
    color:#ff6b6b; font-size:13px; z-index:15; display:none; padding:0 20px;
  }

  .hint{
    position:absolute; bottom:24px; left:0; right:0; text-align:center;
    color:var(--dim); font-size:12.5px; z-index:10; pointer-events:none;
    transition:opacity .4s;
  }

  .startOverlay{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:16px; background:#000; z-index:20; text-align:center; padding:20px;
  }
  .startOverlay h2{ margin:0; font-size:22px; font-weight:600; }
  .startOverlay p{ color:var(--dim); max-width:380px; font-size:13.5px; line-height:1.6; margin:0; }
  .startOverlay button{
    background:var(--cyan); color:#00181c; border:none; padding:13px 26px;
    border-radius:99px; font-size:14.5px; font-weight:600; cursor:pointer; margin-top:6px;
  }
  .startOverlay button:active{ transform:scale(0.97); }
  .fadeOut{ opacity:0 !important; pointer-events:none; }
  #debugLine{
    position:absolute; top:70px; right:22px; z-index:10; font-size:11px;
    color:var(--dim); font-family: monospace; text-align:right; line-height:1.6;
  }
  #toast{
    position:absolute; top:90px; left:50%; transform:translate(-50%,-8px);
    background:rgba(26,26,32,0.9); color:#fff; font-size:13px; font-weight:600;
    padding:9px 18px; border-radius:99px; z-index:12; opacity:0;
    transition:opacity .25s, transform .25s; pointer-events:none;
  }
  #toast.show{ opacity:1; transform:translate(-50%,0); }
</style>
</head>
<body>

<div id="stage">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="fx"></canvas>
</div>

<header>
  <h1>Hand Playground <span>· just wave and see what happens</span></h1>
  <div class="modes" id="modes">
    <button class="modeBtn active" data-mode="draw">Draw</button>
    <button class="modeBtn" data-mode="fireworks">Fireworks</button>
  </div>
</header>

<div id="toast"></div>
<div id="debugLine"></div>
<div class="hint" id="hint">one finger draws · open palm rubbing wipes it away</div>
<div id="errBox"></div>

<div class="startOverlay" id="startOverlay">
  <h2>Give it your hand 👋</h2>
  <button id="startBtn">Turn on my camera</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const fxCanvas = document.getElementById('fx');
const fxCtx = fxCanvas.getContext('2d');
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const hint = document.getElementById('hint');
const modeButtons = document.querySelectorAll('.modeBtn');
const debugLine = document.getElementById('debugLine');
let frameCount = 0;
let lastDebugUpdate = 0;

let mode = 'draw';

function resize(){
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const HINTS = {
  draw: 'one finger draws · rub your open palm to wipe · swipe left/right to switch modes',
  fireworks: 'hold your palm open and still to set one off · swipe left/right to switch modes'
};

const toastEl = document.getElementById('toast');
let toastTimer = null;
function flashToast(text){
  toastEl.textContent = text;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1100);
}

// swipe-to-switch-mode tracking
let wristHistory = [];
let lastSwitchTime = 0;
const SWIPE_DISTANCE = 170;   // px the open hand must travel
const SWIPE_WINDOW = 350;     // ms window to measure the swipe over
const SWITCH_COOLDOWN = 1000; // ms between allowed switches

function checkSwipe(openHand, palmX){
  const now = Date.now();
  if (!openHand){ wristHistory = []; return; }

  wristHistory.push({x: palmX, t: now});
  wristHistory = wristHistory.filter(p => now - p.t <= SWIPE_WINDOW);
  if (wristHistory.length < 2) return;
  if (now - lastSwitchTime < SWITCH_COOLDOWN) return;

  const delta = palmX - wristHistory[0].x;
  if (Math.abs(delta) < SWIPE_DISTANCE) return;

  const currentIndex = MODES.indexOf(mode);
  const nextIndex = delta > 0
    ? (currentIndex + 1) % MODES.length
    : (currentIndex - 1 + MODES.length) % MODES.length;

  setMode(MODES[nextIndex], true);
  lastSwitchTime = now;
  wristHistory = [];
}

const MODES = ['draw', 'fireworks'];

function setMode(newMode, showToast){
  mode = newMode;
  modeButtons.forEach(b => b.classList.toggle('active', b.dataset.mode === newMode));
  hint.textContent = HINTS[newMode];
  hint.classList.remove('fadeOut');
  fxCtx.clearRect(0,0,fxCanvas.width, fxCanvas.height);
  if (newMode === 'draw'){ strokes = []; activeStroke = null; }
  if (showToast) flashToast(newMode.charAt(0).toUpperCase() + newMode.slice(1));
}

modeButtons.forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode, false));
});

setTimeout(() => hint.classList.add('fadeOut'), 6000);

// -------------------- draw strokes (proper pen/marker lines, not blurred dots) --------------------
let strokes = [];     // array of {points:[{x,y}, ...]}
let activeStroke = null;

function beginStroke(x, y){
  activeStroke = { points: [{x, y}] };
  strokes.push(activeStroke);
  if (strokes.length > 40) strokes.shift(); // cap how much ink can build up
}
function extendStroke(x, y){
  if (!activeStroke){ beginStroke(x, y); return; }
  const last = activeStroke.points[activeStroke.points.length - 1];
  if (Math.hypot(x - last.x, y - last.y) > 1.5){
    activeStroke.points.push({x, y});
  }
}
function endStroke(){
  activeStroke = null;
}
function eraseNear(x, y, radius){
  const result = [];
  strokes.forEach(s => {
    let current = [];
    s.points.forEach(p => {
      if (Math.hypot(p.x - x, p.y - y) > radius){
        current.push(p);
      } else {
        if (current.length >= 2) result.push({points: current});
        current = [];
      }
    });
    if (current.length >= 2) result.push({points: current});
  });
  strokes = result;
  activeStroke = null;
}
function drawStrokes(){
  const drawable = strokes.filter(s => s.points.length >= 2);
  if (drawable.length === 0) return;

  // soft outer glow, one draw call for every stroke combined
  fxCtx.save();
  fxCtx.lineJoin = 'round'; fxCtx.lineCap = 'round';
  fxCtx.strokeStyle = 'rgba(77,232,255,0.30)';
  fxCtx.lineWidth = 13;
  fxCtx.shadowColor = '#4de8ff';
  fxCtx.shadowBlur = 8;
  fxCtx.beginPath();
  drawable.forEach(s => {
    fxCtx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) fxCtx.lineTo(s.points[i].x, s.points[i].y);
  });
  fxCtx.stroke();
  fxCtx.restore();

  // crisp marker core, no blur — one draw call for every stroke combined
  fxCtx.save();
  fxCtx.lineJoin = 'round'; fxCtx.lineCap = 'round';
  fxCtx.strokeStyle = '#eafcff';
  fxCtx.lineWidth = 4;
  fxCtx.beginPath();
  drawable.forEach(s => {
    fxCtx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) fxCtx.lineTo(s.points[i].x, s.points[i].y);
  });
  fxCtx.stroke();
  fxCtx.restore();
}

// -------------------- pinch pulse rings --------------------
let rings = [];
function spawnRing(x, y, color){
  rings.push({ x, y, r: 8, alpha: 1, color });
}
function updateRings(){
  rings = rings.filter(r => r.alpha > 0);
  rings.forEach(r => {
    r.r += 3.2;
    r.alpha -= 0.045;
    fxCtx.beginPath();
    fxCtx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    fxCtx.strokeStyle = r.color;
    fxCtx.lineWidth = 2.5;
    fxCtx.globalAlpha = Math.max(r.alpha, 0);
    fxCtx.shadowColor = r.color;
    fxCtx.shadowBlur = 16;
    fxCtx.stroke();
    fxCtx.globalAlpha = 1;
  });
}
// -------------------- particle bursts --------------------
let particles = [];
function burst(x, y, color, count=26){
  for(let i=0;i<count;i++){
    const angle = (Math.PI*2*i)/count + Math.random()*0.3;
    const speed = 2 + Math.random()*4;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 1, color });
  }
}
function updateParticles(){
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life -= 0.02;
    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, 3.2*p.life, 0, Math.PI*2);
    fxCtx.fillStyle = p.color;
    fxCtx.shadowColor = p.color;
    fxCtx.shadowBlur = 12;
    fxCtx.globalAlpha = p.life;
    fxCtx.fill();
    fxCtx.globalAlpha = 1;
  });
}

// -------------------- hand skeleton --------------------
const BONES = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],
               [9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function drawHand(landmarks, w, h){
  fxCtx.save();
  fxCtx.strokeStyle = 'rgba(77,232,255,0.55)';
  fxCtx.lineWidth = 2.4;
  fxCtx.shadowColor = '#4de8ff';
  fxCtx.shadowBlur = 6;
  fxCtx.beginPath();
  BONES.forEach(([a,b]) => {
    const p1 = landmarks[a], p2 = landmarks[b];
    fxCtx.moveTo((1-p1.x)*w, p1.y*h);
    fxCtx.lineTo((1-p2.x)*w, p2.y*h);
  });
  fxCtx.stroke();
  fxCtx.restore();

  fxCtx.save();
  fxCtx.fillStyle = '#ffd166';
  fxCtx.shadowColor = '#ffd166';
  fxCtx.shadowBlur = 5;
  fxCtx.beginPath();
  landmarks.forEach(p => {
    fxCtx.moveTo((1-p.x)*w + 3, p.y*h);
    fxCtx.arc((1-p.x)*w, p.y*h, 3, 0, Math.PI*2);
  });
  fxCtx.fill();
  fxCtx.restore();
}

function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function extended(l, tip, pip, wrist){ return dist(l[tip], wrist) > dist(l[pip], wrist)*1.05; }

// -------------------- incoming hand data (raw, from MediaPipe) --------------------
let targetHand = null;
let lastHandSeenTime = 0;
let smoothedHand = null;
const HAND_SMOOTHING = 0.8; // higher = snappier, lower = smoother/laggier

function onResults(results){
  frameCount++;
  const now = Date.now();
  if (now - lastDebugUpdate > 400){
    const handsSeen = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
    debugLine.textContent = `frames: ${frameCount} · hands seen: ${handsSeen}`;
    lastDebugUpdate = now;
  }
  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0){
    targetHand = results.multiHandLandmarks[0];
    lastHandSeenTime = now;
  }
}

// -------------------- gesture state --------------------
let lastFireworkTime = 0;
let stillFrames = 0;
let lastPalmPos = null;
let wasPinching = false;
let lastErasePos = null;

function renderTick(){
  const w = fxCanvas.width, h = fxCanvas.height;
  fxCtx.clearRect(0, 0, w, h);

  updateParticles();
  updateRings();

  const now = Date.now();
  const handActive = targetHand && (now - lastHandSeenTime < 600);

  if (!handActive){
    smoothedHand = null;
    lastPalmPos = null;
    lastErasePos = null;
    requestAnimationFrame(renderTick);
    return;
  }

  // smooth landmark positions toward the latest inference result
  if (!smoothedHand){
    smoothedHand = targetHand.map(p => ({x:p.x, y:p.y}));
  } else {
    for (let i = 0; i < targetHand.length; i++){
      smoothedHand[i].x += (targetHand[i].x - smoothedHand[i].x) * HAND_SMOOTHING;
      smoothedHand[i].y += (targetHand[i].y - smoothedHand[i].y) * HAND_SMOOTHING;
    }
  }
  const lm = smoothedHand;
  drawHand(lm, w, h);

  const wrist = lm[0];
  const thumbTip = lm[4], indexTip = lm[8];
  const idxExt = extended(lm, 8, 6, wrist);
  const midExt = extended(lm, 12, 10, wrist);
  const ringExt = extended(lm, 16, 14, wrist);
  const pinkyExt = extended(lm, 20, 18, wrist);
  const extCount = [idxExt, midExt, ringExt, pinkyExt].filter(Boolean).length;
  const oneFingerOnly = idxExt && !midExt && !ringExt && !pinkyExt;

  const pinching = dist(thumbTip, indexTip) < 0.055;
  const px = (1 - indexTip.x) * w, py = indexTip.y * h;
  const palmX = (1 - wrist.x) * w, palmY = wrist.y * h;

  checkSwipe(extCount >= 3, palmX);

  // pinch -> ring pulse animation (edge-triggered, any mode)
  if (pinching && !wasPinching){
    spawnRing(px, py, '#ffd166');
  }
  wasPinching = pinching;

  if (mode === 'draw'){
    if (!pinching && oneFingerOnly){
      extendStroke(px, py);
      lastErasePos = null;
    } else if (!pinching && extCount >= 3){
      // open palm moving -> rub to erase
      const moved = lastErasePos ? Math.hypot(palmX - lastErasePos.x, palmY - lastErasePos.y) : 999;
      if (moved > 2){
        eraseNear(palmX, palmY, 46);
      }
      lastErasePos = {x:palmX, y:palmY};
      endStroke();
    } else {
      lastErasePos = null;
      endStroke();
    }
    drawStrokes();
  }

  if (mode === 'fireworks'){
    if (extCount >= 3){
      if (lastPalmPos && Math.hypot(palmX-lastPalmPos.x, palmY-lastPalmPos.y) < 6){
        stillFrames++;
      } else {
        stillFrames = 0;
      }
      lastPalmPos = {x:palmX, y:palmY};
      if (stillFrames > 20 && now - lastFireworkTime > 900){
        const colors = ['#4de8ff','#ffd166','#ff6b9d','#9b8cff','#7CFF9E'];
        burst(palmX, palmY, colors[Math.floor(Math.random()*colors.length)], 44);
        lastFireworkTime = now;
        stillFrames = 0;
      }
    } else {
      stillFrames = 0;
    }
  }

  requestAnimationFrame(renderTick);
}

let camera = null;
const errBox = document.getElementById('errBox');

async function start(){
  errBox.style.display = 'none';
  startBtn.disabled = true;
  startBtn.textContent = 'Starting…';

  try{
    if (typeof Hands === 'undefined' || typeof Camera === 'undefined'){
      throw new Error('Hand-tracking scripts did not load — check your internet connection and reload the page.');
    }

    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}` });
    hands.setOptions({ maxNumHands:1, modelComplexity:0, minDetectionConfidence:0.5, minTrackingConfidence:0.4 });
    hands.onResults(onResults);

    camera = new Camera(video, {
      onFrame: async () => { await hands.send({image: video}); },
      width: 640, height: 480
    });
    await camera.start();

    startOverlay.classList.add('fadeOut');
    setTimeout(()=> startOverlay.style.display='none', 400);
    requestAnimationFrame(renderTick);
  } catch(err){
    startBtn.disabled = false;
    startBtn.textContent = 'Turn on my camera';
    errBox.style.display = 'block';
    if (err.name === 'NotAllowedError'){
      errBox.textContent = "Camera permission was blocked — click the camera icon in your browser's address bar, allow it, then try again.";
    } else if (err.name === 'NotFoundError'){
      errBox.textContent = "No camera was found on this device.";
    } else {
      errBox.textContent = 'Something went wrong starting the camera: ' + err.message;
    }
    console.error(err);
  }
}

startBtn.addEventListener('click', start);
</script>
</body>
</html>
