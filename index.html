<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arsalan | AI Expert</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body{
  background:#000;
  color:#e0e0e0;
  overflow-x:hidden;
}

/* REMOVE CURSOR ONLY ON DESKTOP */
@media(min-width:901px){
  body{ cursor:none; }
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* HERO */
header{
  padding:100px 20px 60px;
  display:flex;
  gap:40px;
  align-items:center;
  min-height:80vh;
}

.hero-left, .hero-right{
  flex:1;
}

/* CARD STYLE */
.card{
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  border-radius:20px;
  padding:30px;
}

/* BIO SPLIT */
.bio-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

header h1{
  font-size:3.5rem;
  background: linear-gradient(to right, #00f7ff,#008cff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

header p{
  line-height:1.7;
  color:#ccc;
}

/* IMAGE */
.hero-img{
  width:100%;
  max-width:400px;
  display:block;
  margin:auto;
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-20px);}
}

/* SECTIONS */
section{
  margin-top:70px;
}

h2{
  text-align:center;
  color:#00f7ff;
  margin-bottom:20px;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.project{
  padding:20px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
}

.project video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* CTA BUTTON */
.cta{
  text-align:center;
  margin-top:50px;
}

.cta a{
  display:inline-block;
  padding:15px 30px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
  border-radius:30px;
  text-decoration:none;
  box-shadow:0 0 20px #00ff88;
  transition:0.3s;
}

.cta a:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px #00ff88;
}

/* RESPONSIVE */
@media(max-width:900px){
  header{
    flex-direction:column;
    text-align:center;
  }

  .bio-grid{
    grid-template-columns:1fr;
  }
}

/* CREATURE CANVAS OFF ON MOBILE */
@media(max-width:900px){
  #creature-canvas{
    display:none !important;
  }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>
<canvas id="creature-canvas"></canvas>

<div class="container">

<header>
  <div class="hero-left">

    <div class="card">
      <h1>Arsalan</h1>
    </div>

    <div class="bio-grid">
      <div class="card">
        <p>
          AI Expert focused on building high-impact content using advanced tools and automation systems.
        </p>
      </div>

      <div class="card">
        <p>
          I create AI videos, product visuals, and automated content pipelines that help brands scale faster.
        </p>
      </div>
    </div>

  </div>

  <div class="hero-right">
    <img src="hero-image.png" class="hero-img">
  </div>
</header>

<section>
  <h2>Portfolio</h2>

  <div class="projects">

    <div class="project">
      <h3>AI Video 1</h3>
      <video controls>
        <source src="video1.mp4">
      </video>
    </div>

    <div class="project">
      <h3>AI Video 2</h3>
      <video controls>
        <source src="video2.mp4">
      </video>
    </div>

    <div class="project">
      <h3>Photos 1</h3>
      <video autoplay loop muted>
        <source src="slideshow1.mp4">
      </video>
    </div>

    <div class="project">
      <h3>Photos 2</h3>
      <video autoplay loop muted>
        <source src="slideshow2.mp4">
      </video>
    </div>

  </div>

  <!-- CTA BUTTON -->
  <div class="cta">
    <a href="facp.html">Get FACP Assistant</a>
  </div>

</section>

<footer style="text-align:center;margin:60px 0;color:#777;">
  © 2026 Arsalan
</footer>

</div>

<script>
// PARTICLES
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="#00f7ff";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}

animate();

// CREATURE ONLY DESKTOP
if(window.innerWidth > 900){
  const c = document.getElementById('creature-canvas');
  const cx = c.getContext('2d');

  c.width = window.innerWidth;
  c.height = window.innerHeight;

  let mx = window.innerWidth/2;
  let my = window.innerHeight/2;

  window.addEventListener('mousemove',e=>{
    mx=e.clientX;
    my=e.clientY;
  });

  function draw(){
    cx.clearRect(0,0,c.width,c.height);
    cx.beginPath();
    cx.arc(mx,my,5,0,Math.PI*2);
    cx.fillStyle="#00f7ff";
    cx.fill();
    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
